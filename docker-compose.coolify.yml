services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.coolify.next
      args:
        APP_NAME: web
        NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    expose:
      - "3000"
    restart: unless-stopped
